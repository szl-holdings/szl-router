# SZL Router config (reference only — the live registry lives in szl_router/core.py).
# This file documents the env vars and the routing doctrine. No secrets here.
#
# Routing doctrine (sovereign-first):
#   1. our own metal  (box_gpu, nvidia_gpu)        sovereign: true   tier: sovereign
#   2. free grid      (groq, nvidia_nim, zhipu, siliconflow)         tier: free-grid
#   3. paid grid      (moonshot / Kimi)                              tier: paid-grid
#
# A logical model resolves to an ordered fallback list. Unavailable providers
# (missing key/url) are skipped at call time — never faked.

providers:
  box_gpu:
    base_url_env: A11OY_MODEL_BASE_URL     # e.g. http://100.125.77.31:11434/v1 (Tailscale Ollama)
    key_env: A11OY_GPU_TOKEN
    sovereign: true
    energy_source: self-hosted
  nvidia_gpu:
    base_url_env: NVIDIA_GPU_BASE_URL       # set to the rented GPU's OpenAI-compatible URL to arm
    key_env: NVIDIA_GPU_TOKEN
    sovereign: true
    energy_source: self-hosted
  omen_gpu:
    base_url_env: OMEN_GPU_BASE_URL         # e.g. http://100.70.130.45:11434/v1 (always-on OMEN home node)
    key_env: OMEN_GPU_TOKEN
    sovereign: true
    energy_source: self-hosted
    # OFFLOAD: the always-on HOME desktop (OMEN RTX 4060 Ti 8GB). Preferred FIRST
    # for szl-fast + embeddings so the TRAVELING Blackwell laptop (box_gpu) is not
    # the sole worker. A SEPARATE sovereign worker: placement + sequential failover
    # only; VRAM is NEVER fused/combined across nodes (no "16GB combined" claim).
  groq:
    base_url: https://api.groq.com/openai/v1
    key_env: GROQ_API_KEY
    sovereign: false
    energy_source: grid
  nvidia_nim:
    base_url: https://integrate.api.nvidia.com/v1
    key_env: NVIDIA_NIM_API_KEY
    sovereign: false
    energy_source: grid
  zhipu:
    base_url: https://open.bigmodel.cn/api/paas/v4
    key_env: ZHIPU_API_KEY
    sovereign: false
    energy_source: grid
  siliconflow:
    base_url: https://api.siliconflow.com/v1
    key_env: SILICONFLOW_API_KEY
    sovereign: false
    energy_source: grid
  moonshot:
    base_url: https://api.moonshot.ai/v1
    key_env: KIMI_API_KEY
    sovereign: false
    energy_source: grid

logical_models:
  szl-large:  [box_gpu, nvidia_gpu, omen_gpu, groq, nvidia_nim, moonshot]
  szl-fast:   [omen_gpu, box_gpu, nvidia_gpu, groq, nvidia_nim]   # HOME node first (offload)
  szl-coder:  [box_gpu, nvidia_gpu, omen_gpu, nvidia_nim, groq]

# Embeddings routes (HOME-node-first). Served via OpenAI-compatible /v1/embeddings.
# Same honest provenance as chat; sequential failover across separate sovereign
# workers; never fused VRAM.
embed_models:
  bge-large:  [omen_gpu, box_gpu, nvidia_gpu]

server:
  port_env: PORT                 # default 8099
  auth_token_env: SZL_ROUTER_TOKEN   # optional; if set, callers must Bearer-match
