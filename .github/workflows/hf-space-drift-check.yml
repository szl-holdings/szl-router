name: hf-space-drift-check

# Independently assert the live llm-router-live Space == szl-router/space (sha256).
# Runs AFTER hf-space-deploy completes (never racing it), and daily, so silent
# HF-side edits surface. PR-time runs were removed: while a space/** change is
# un-deployed, live != source is the *expected* state — a guaranteed-red check
# only trains people to dismiss real drift.
on:
  workflow_run:
    workflows: [hf-space-deploy]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    # For workflow_run triggers, only assert after a *successful* deploy;
    # a failed deploy already raises its own red.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
        with:
          python-version: "3.12"
      - name: Assert live Space == source tree
        run: python scripts/hf_space_drift_check.py
